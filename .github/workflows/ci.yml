name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10"

jobs:
  # ── Lint & Typecheck ──────────────────────────────────────────
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        working-directory: apps/api
        run: pnpm prisma generate
        env:
          DATABASE_URL: "postgresql://forgeops:forgeops_dev_pw@localhost:5432/forgeops"

      - run: pnpm lint

      - run: pnpm typecheck

  # ── Build ─────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        working-directory: apps/api
        run: pnpm prisma generate
        env:
          DATABASE_URL: "postgresql://forgeops:forgeops_dev_pw@localhost:5432/forgeops"

      - run: pnpm build

  # ── Tests (with real Postgres + Redis) ────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: forgeops
          POSTGRES_PASSWORD: forgeops_dev_pw
          POSTGRES_DB: forgeops_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U forgeops -d forgeops_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://forgeops:forgeops_dev_pw@localhost:5432/forgeops_test"
      REDIS_URL: "redis://localhost:6379"
      JWT_ACCESS_SECRET: "test-access-secret-min-32-characters-long"
      JWT_REFRESH_SECRET: "test-refresh-secret-min-32-characters-long"
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        working-directory: apps/api
        run: pnpm prisma generate

      - name: Run migrations
        working-directory: apps/api
        run: pnpm prisma migrate deploy

      - run: pnpm test

  # ── Docker build (verify Dockerfiles compile) ─────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f infra/docker/Dockerfile.api -t forgeops-api:test .

      - name: Build Web image
        run: docker build -f infra/docker/Dockerfile.web -t forgeops-web:test .
